<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lupa Password | Wisata Borneo</title>
    <link rel="stylesheet" href="../assets/css/index.css">
    <script src="../assets/js/api.js?v=6"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        input[type="email"],
        input[type="text"] {
            width: 100%;             
            padding: 10px;           
            margin-bottom: 15px;     
            border: 1px solid #ccc;  
            border-radius: 5px;     
            box-sizing: border-box;  
        }

        button {
            width: 100%;             
            padding: 10px;
            background-color: #ffc107; 
            color: #333;             
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            opacity: 0.9;            
        }

        label {
            display: block;
            margin-bottom: 5px;
            text-align: left;
            font-weight: 600;
        }

        .back-link {
            display: block;
            margin-top: 15px;
            text-align: center;
            text-decoration: none;
            color: #666;
            font-size: 0.9em;
        }
        .back-link:hover {
            color: #28a745;
            text-decoration: underline;
        }
    </style>
</head>
<body style="background:#f0f5f1; display:flex; justify-content:center; align-items:center; min-height:100vh; padding:20px;">

    <div class="booking-form-container" style="background:white; padding:40px; border-radius:10px; width:100%; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.2);">
        <h2 style="text-align:center; color:#333; margin-bottom:20px;">Reset Password</h2>
        <p style="text-align:center; color:#666; margin-bottom:20px; font-size:0.9em;">Masukkan email yang terdaftar. Kami akan mengirimkan link untuk mereset password Anda.</p>
        
        <form id="forgot-form" class="form-style">
            <div class="form-group">
                <label><i class="fas fa-envelope"></i> Email Anda</label>
                <input type="email" id="email" required placeholder="contoh@email.com">
            </div>
            <button type="submit" class="btn submit-booking-btn">Kirim Link Reset</button>
            
            <p style="margin-top:20px; text-align:center;">
                <a href="login.html" style="color:#8ac926; text-decoration:none;">&larr; Kembali ke Login</a>
            </p>
        </form>
    </div>

    <script>
        document.getElementById('forgot-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Mengirim..."; btn.disabled = true;

            try {
                const res = await fetch(`${BASE_API_URL}/auth_forgot.php`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ email: document.getElementById('email').value })
                });
                const json = await res.json();
                alert(json.message); // Tampilkan pesan sukses/gagal
            } catch (err) { alert("Error koneksi"); } 
            finally { btn.innerText = "Kirim Link Reset"; btn.disabled = false; }
        });
    </script>
</body>
</html>
