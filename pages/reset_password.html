<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Buat Password Baru</title>
    <link rel="stylesheet" href="../assets/css/index.css">
    <script src="../assets/js/api.js?v=6"></script>
    <style>
        input[type="password"] {
            width: 100%;             
            padding: 10px;           
            margin-bottom: 15px;     
            border: 1px solid #ccc;  
            border-radius: 5px;      
            box-sizing: border-box;  
        }

        button {
            width: 100%;             
            padding: 12px;
            background-color: #28a745; 
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background-color: #218838; 
        }

        label {
            display: block;          
            margin-bottom: 5px;     
            text-align: left;       
            font-weight: 600;
        }
    </style>
</head>
<body style="background:#f0f5f1; display:flex; justify-content:center; align-items:center; min-height:100vh; padding: 20px;">

    <div class="booking-form-container" style="background:white; padding:40px; border-radius:10px; width:100%; max-width:400px; box-shadow:0 4px 10px rgba(0,0,0,0.2);">
        <h2 style="text-align:center;">Password Baru</h2>
        <form id="reset-form" class="form-style">
            <div class="form-group">
                <label>Token (Dari Email)</label>
                <input type="text" id="token" required placeholder="Paste token disini...">
            </div>
            <div class="form-group">
                <label>Password Baru</label>
                <input type="password" id="new_password" required minlength="6" placeholder="Minimal 6 karakter">
            </div>
            <button type="submit" class="btn submit-booking-btn">Ubah Password</button>
        </form>
    </div>

    <script>
        // Auto-fill token dari URL jika ada (misal: reset_password.html?token=abc)
        const urlParams = new URLSearchParams(window.location.search);
        const tokenParam = urlParams.get('token');
        if (tokenParam) document.getElementById('token').value = tokenParam;

        document.getElementById('reset-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = document.getElementById('token').value;
            const newPass = document.getElementById('new_password').value;

            try {
                const res = await fetch(`${BASE_API_URL}/auth_reset.php`, {
                    method: 'POST',
                    headers: getHeaders(),
                    body: JSON.stringify({ token: token, new_password: newPass })
                });
                const json = await res.json();
                
                if (json.status === 'success') {
                    alert("Password berhasil diubah! Silakan login.");
                    window.location.href = 'login.html';
                } else {
                    alert(json.message);
                }
            } catch (err) { alert("Error koneksi"); }
        });
    </script>
</body>
</html>
